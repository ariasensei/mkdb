<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MKDB - Systems. Solutions. Success.</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      scroll-behavior: smooth;
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #0f1117;
      color: #e8e4dc;
    }

    .font-display {
      font-family: "Playfair Display", serif;
    }

    .gradient-gold {
      background: linear-gradient(
        135deg,
        #c9a84c 0%,
        #f0d78c 50%,
        #c9a84c 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      box-shadow: 0 0 0 2px #c9a84c;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="fixed top-0 w-full bg-[#0f1117]/90 backdrop-blur-md border-b border-[#c9a84c]/10 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

      <div class="flex items-center gap-4">
        <div class="font-display font-black text-2xl gradient-gold">
          MKDB
        </div>

        <div class="hidden sm:flex items-center gap-2 text-sm text-[#a09a8e] border-l border-[#c9a84c]/20 pl-4">
          <i data-lucide="clock" class="w-4 h-4 text-[#c9a84c]"></i>
          <span id="ph-clock">--:--</span>
          <span class="text-xs">PH</span>
        </div>
      </div>

      <button id="mobile-menu-btn" class="md:hidden">
        <i data-lucide="menu"></i>
      </button>

      <div class="hidden md:flex gap-8 text-sm">
        <a href="#consult" class="hover:text-[#c9a84c]">Consultation</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="min-h-screen flex items-center justify-center px-6 text-center">

    <div>
      <h1 class="font-display text-6xl font-black gradient-gold">
        MKDB
      </h1>

      <p class="tracking-[0.3em] uppercase text-[#a09a8e] mt-4">
        Systems. Solutions. Success.
      </p>

      <a
        href="#consult"
        class="inline-block mt-10 px-8 py-3 bg-[#c9a84c] text-[#0f1117] rounded-lg font-semibold hover:bg-[#d8bb65]"
      >
        Book Free Consultation
      </a>
    </div>

  </section>

  <!-- CONSULTATION -->
  <section id="consult" class="py-24 px-6 bg-[#13161f]">

    <div class="max-w-5xl mx-auto">

      <div class="text-center mb-12">
        <h2 class="font-display text-4xl font-bold">
          Book a Free Consultation
        </h2>

        <p class="text-[#a09a8e] mt-4">
          Fill out the form below and your email app will open automatically.
        </p>
      </div>

      <div class="grid md:grid-cols-2 gap-8">

        <!-- CALENDAR -->
        <div class="bg-[#181b24] p-6 rounded-xl border border-[#c9a84c]/10">

          <div class="flex justify-between items-center mb-4">
            <button id="prev-month">
              <i data-lucide="chevron-left"></i>
            </button>

            <h3 id="calendar-title" class="font-semibold"></h3>

            <button id="next-month">
              <i data-lucide="chevron-right"></i>
            </button>
          </div>

          <div class="grid grid-cols-7 text-center text-xs text-[#706b60] mb-2">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
          </div>

          <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>

          <div class="mt-6">
            <label class="text-sm block mb-2">
              Preferred Time
            </label>

            <select
              id="time-select"
              class="w-full bg-[#0f1117] border border-[#c9a84c]/20 rounded-lg px-4 py-3"
            >
              <option value="">Select Time</option>
              <option>9:00 AM</option>
              <option>10:00 AM</option>
              <option>11:00 AM</option>
              <option>1:00 PM</option>
              <option>2:00 PM</option>
              <option>3:00 PM</option>
            </select>
          </div>

        </div>

        <!-- FORM -->
        <form id="consult-form" class="space-y-4">

          <div>
            <label class="text-sm block mb-1">
              Full Name *
            </label>

            <input
              id="c-name"
              type="text"
              required
              class="w-full bg-[#0f1117] border border-[#c9a84c]/20 rounded-lg px-4 py-3"
            />
          </div>

          <div>
            <label class="text-sm block mb-1">
              Email *
            </label>

            <input
              id="c-email"
              type="email"
              required
              class="w-full bg-[#0f1117] border border-[#c9a84c]/20 rounded-lg px-4 py-3"
            />
          </div>

          <div>
            <label class="text-sm block mb-1">
              Phone
            </label>

            <input
              id="c-phone"
              type="tel"
              class="w-full bg-[#0f1117] border border-[#c9a84c]/20 rounded-lg px-4 py-3"
            />
          </div>

          <div>
            <label class="text-sm block mb-1">
              Company
            </label>

            <input
              id="c-company"
              type="text"
              class="w-full bg-[#0f1117] border border-[#c9a84c]/20 rounded-lg px-4 py-3"
            />
          </div>

          <div>
            <label class="text-sm block mb-1">
              Service Interested In
            </label>

            <select
              id="c-service"
              class="w-full bg-[#0f1117] border border-[#c9a84c]/20 rounded-lg px-4 py-3"
            >
              <option value="">Select Service</option>
              <option>Business Systems</option>
              <option>Web Development</option>
              <option>IT Consultancy</option>
              <option>Training</option>
            </select>
          </div>

          <div>
            <label class="text-sm block mb-1">
              Message
            </label>

            <textarea
              id="c-message"
              rows="4"
              class="w-full bg-[#0f1117] border border-[#c9a84c]/20 rounded-lg px-4 py-3"
            ></textarea>
          </div>

          <button
            id="submit-btn"
            type="submit"
            class="w-full py-3 bg-[#c9a84c] text-[#0f1117] font-semibold rounded-lg hover:bg-[#d8bb65] flex items-center justify-center gap-2"
          >
            <i data-lucide="send"></i>
            Submit Booking Request
          </button>

          <div
            id="form-status"
            class="hidden text-center text-sm py-3 rounded-lg"
          ></div>

        </form>

      </div>

    </div>

  </section>

  <!-- JAVASCRIPT -->
  <script>

    lucide.createIcons();

    // =========================
    // PH CLOCK
    // =========================

    function updatePHClock() {

      const now = new Date();

      const phTime = new Date(
        now.toLocaleString("en-US", {
          timeZone: "Asia/Manila"
        })
      );

      const hours = phTime.getHours().toString().padStart(2, "0");
      const minutes = phTime.getMinutes().toString().padStart(2, "0");

      const ampm = phTime.getHours() >= 12 ? "PM" : "AM";

      document.getElementById("ph-clock").textContent =
        `${hours}:${minutes} ${ampm}`;
    }

    updatePHClock();
    setInterval(updatePHClock, 1000);

    // =========================
    // CALENDAR
    // =========================

    let currentDate = new Date();
    let selectedDate = null;

    function renderCalendar() {

      const grid = document.getElementById("calendar-grid");
      const title = document.getElementById("calendar-title");

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      title.textContent =
        currentDate.toLocaleDateString("en-US", {
          month: "long",
          year: "numeric"
        });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth =
        new Date(year, month + 1, 0).getDate();

      const today = new Date();

      let html = "";

      for (let i = 0; i < firstDay; i++) {
        html += "<span></span>";
      }

      for (let d = 1; d <= daysInMonth; d++) {

        const date = new Date(year, month, d);

        const isPast =
          date <
          new Date(
            today.getFullYear(),
            today.getMonth(),
            today.getDate()
          );

        const isWeekend =
          date.getDay() === 0 || date.getDay() === 6;

        const isSelected =
          selectedDate &&
          date.toDateString() ===
          selectedDate.toDateString();

        if (isPast || isWeekend) {

          html += `
            <span class="py-2 text-[#555] cursor-not-allowed">
              ${d}
            </span>
          `;

        } else {

          html += `
            <button
              type="button"
              class="py-2 rounded-lg transition
              ${isSelected
                ? "bg-[#c9a84c] text-black font-bold"
                : "hover:bg-[#c9a84c]/20"}"
              data-date="${date.toISOString()}"
            >
              ${d}
            </button>
          `;
        }
      }

      grid.innerHTML = html;

      document.querySelectorAll("[data-date]").forEach(btn => {

        btn.addEventListener("click", () => {

          selectedDate = new Date(btn.dataset.date);

          renderCalendar();
        });
      });
    }

    renderCalendar();

    document
      .getElementById("prev-month")
      .addEventListener("click", () => {

        currentDate.setMonth(currentDate.getMonth() - 1);

        renderCalendar();
      });

    document
      .getElementById("next-month")
      .addEventListener("click", () => {

        currentDate.setMonth(currentDate.getMonth() + 1);

        renderCalendar();
      });

    // =========================
    // FORM SUBMISSION
    // =========================

    document
      .getElementById("consult-form")
      .addEventListener("submit", function (e) {

        e.preventDefault();

        const btn = document.getElementById("submit-btn");
        const status = document.getElementById("form-status");

        const name =
          document.getElementById("c-name").value.trim();

        const email =
          document.getElementById("c-email").value.trim();

        const phone =
          document.getElementById("c-phone").value.trim();

        const company =
          document.getElementById("c-company").value.trim();

        const service =
          document.getElementById("c-service").value;

        const message =
          document.getElementById("c-message").value.trim();

        const time =
          document.getElementById("time-select").value;

        // VALIDATIONS

        if (!selectedDate) {

          status.className =
            "text-center text-sm py-3 rounded-lg bg-red-500/10 text-red-400";

          status.textContent =
            "Please select a consultation date.";

          status.classList.remove("hidden");

          return;
        }

        if (!time) {

          status.className =
            "text-center text-sm py-3 rounded-lg bg-red-500/10 text-red-400";

          status.textContent =
            "Please select a preferred time.";

          status.classList.remove("hidden");

          return;
        }

        // LOADING

        btn.disabled = true;

        btn.innerHTML = `
          <span class="animate-spin inline-block w-4 h-4 border-2 border-black border-t-transparent rounded-full"></span>
          Preparing Email...
        `;

        // FORMAT DATE

        const formattedDate =
          selectedDate.toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric"
          });

        // SUBJECT

        const subject = encodeURIComponent(
          `Consultation Booking Request - ${name}`
        );

        // BODY

        const body = encodeURIComponent(`
New Consultation Booking Request

FULL NAME:
${name}

EMAIL:
${email}

PHONE:
${phone}

COMPANY:
${company}

SERVICE:
${service}

PREFERRED DATE:
${formattedDate}

PREFERRED TIME:
${time}

MESSAGE:
${message}

--------------------------
Sent from MKDB Website
`);

        // OPEN EMAIL APP

        window.location.href =
          `mailto:mrsmkdbasa@gmail.com?subject=${subject}&body=${body}`;

        // SUCCESS

        status.className =
          "text-center text-sm py-3 rounded-lg bg-green-500/10 text-green-400";

        status.textContent =
          "Your email app has been opened. Please click SEND.";

        status.classList.remove("hidden");

        // RESET AFTER DELAY

        setTimeout(() => {

          document.getElementById("consult-form").reset();

          selectedDate = null;

          renderCalendar();

          btn.disabled = false;

          btn.innerHTML = `
            <i data-lucide="send"></i>
            Submit Booking Request
          `;

          lucide.createIcons();

        }, 500);

      });

  </script>

</body>
</html>
